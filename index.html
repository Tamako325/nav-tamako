<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小工具导航</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="站点导航">
        <button class="feedback-entry" id="feedbackOpen" type="button">
          <i data-lucide="message-square-plus" aria-hidden="true"></i>
          <span>反馈</span>
        </button>

        <a class="brand" href="./index.html" aria-label="小工具导航首页">
          <span class="brand-mark">N</span>
          <span>
            <strong>小工具导航</strong>
            <small>Tools Navigator</small>
          </span>
        </a>

        <div class="side-title">分类</div>
        <nav id="categoryNav" class="category-nav"></nav>
      </aside>

      <div class="layout">
        <main class="content">
          <header class="topbar">
            <div class="search-wrap">
              <i data-lucide="search" aria-hidden="true"></i>
              <input id="searchInput" type="search" placeholder="搜索工具、标签或用途" autocomplete="off" />
            </div>
          </header>

          <section class="summary">
            <div>
              <p class="eyebrow">Toolkit</p>
              <h1>常用小工具入口</h1>
            </div>
            <div class="stats" aria-label="工具统计">
              <div>
                <strong id="toolCount">0</strong>
                <span>工具</span>
              </div>
              <div>
                <strong id="categoryCount">0</strong>
                <span>分类</span>
              </div>
              <div>
                <strong id="favoriteCount">0</strong>
                <span>收藏</span>
              </div>
            </div>
          </section>

          <section class="controls" aria-label="筛选">
            <div class="segmented" role="tablist" aria-label="显示范围">
              <button class="segment active" type="button" data-filter="all">全部</button>
              <button class="segment" type="button" data-filter="favorites">收藏</button>
              <button class="segment" type="button" data-filter="empty">待补充</button>
            </div>
            <div class="active-meta" id="activeMeta">全部分类</div>
          </section>

          <div id="sections" class="sections"></div>

          <section id="emptyState" class="empty-state" hidden>
            <i data-lucide="folder-search" aria-hidden="true"></i>
            <h2>没有匹配的工具</h2>
            <p>换一个关键词或分类。</p>
          </section>
        </main>
      </div>
    </div>

    <dialog class="feedback-dialog" id="feedbackDialog">
      <form class="feedback-panel" id="feedbackForm" method="dialog">
        <div class="feedback-head">
          <div>
            <p class="eyebrow">Feedback</p>
            <h2>提交反馈</h2>
          </div>
          <button class="icon-button" id="feedbackClose" type="button" aria-label="关闭反馈窗口">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>

        <label class="field">
          <span>反馈类型</span>
          <select id="feedbackType">
            <option value="工具打不开">工具打不开 / 无法正常使用</option>
            <option value="新增工具">想要新增某个小工具</option>
            <option value="功能建议">网站功能建议</option>
            <option value="其他问题">其他问题</option>
          </select>
        </label>

        <label class="field">
          <span>相关工具或功能</span>
          <input id="feedbackTarget" type="text" placeholder="例如：iLovePDF、图片压缩、二维码生成" />
        </label>

        <label class="field">
          <span>详细说明</span>
          <textarea id="feedbackDetail" rows="5" placeholder="请说明打不开的现象、希望新增的工具链接，或你想要的功能。"></textarea>
        </label>

        <div class="feedback-actions">
          <button class="secondary-button" id="feedbackCancel" type="button">取消</button>
          <button class="primary-button" type="submit">
            <i data-lucide="send" aria-hidden="true"></i>
            <span>提交到 GitHub</span>
          </button>
        </div>
      </form>
    </dialog>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
